<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 1920;
canvas.height = 1080;

// Particle system
const particles = [];
const PARTICLE_COUNT = 200;
const TITLE = 'CHANNEL ONE';
const SUBTITLE = 'FIRST LIGHT';

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.8,
    vy: (Math.random() - 0.5) * 0.8,
    radius: Math.random() * 2 + 0.5,
    alpha: Math.random() * 0.6 + 0.2,
    pulse: Math.random() * Math.PI * 2,
  });
}

let frame = 0;
const startTime = Date.now();

function draw() {
  const t = (Date.now() - startTime) / 1000;
  frame++;

  // Dark gradient background
  const grad = ctx.createRadialGradient(960, 540, 100, 960, 540, 900);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(1, '#000000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw particle connections
  ctx.strokeStyle = 'rgba(100, 140, 255, 0.05)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  // Update and draw particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.pulse += 0.02;

    // Wrap around edges
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;

    const glow = p.alpha * (0.7 + 0.3 * Math.sin(p.pulse));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(140, 180, 255, ${glow})`;
    ctx.fill();
  }

  // Title text — fade in over first 3 seconds
  const titleAlpha = Math.min(1, t / 3);
  const titleY = 540 + Math.sin(t * 0.5) * 8;

  // Title glow
  ctx.save();
  ctx.globalAlpha = titleAlpha * 0.3;
  ctx.font = 'bold 120px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#4488ff';
  ctx.shadowBlur = 40;
  ctx.fillStyle = '#4488ff';
  ctx.fillText(TITLE, 960, titleY);
  ctx.restore();

  // Title solid
  ctx.save();
  ctx.globalAlpha = titleAlpha;
  ctx.font = 'bold 120px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#4488ff';
  ctx.shadowBlur = 20;
  ctx.fillText(TITLE, 960, titleY);
  ctx.restore();

  // Subtitle — fade in after 2 seconds
  const subAlpha = Math.max(0, Math.min(1, (t - 2) / 2));
  ctx.save();
  ctx.globalAlpha = subAlpha * 0.8;
  ctx.font = '300 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = '12px';
  ctx.fillStyle = '#8ab4ff';
  ctx.fillText(SUBTITLE, 960, titleY + 80);
  ctx.restore();

  // Horizontal rule under title
  const lineAlpha = Math.max(0, Math.min(1, (t - 1.5) / 1.5));
  const lineWidth = lineAlpha * 400;
  ctx.save();
  ctx.globalAlpha = lineAlpha * 0.6;
  ctx.strokeStyle = '#4488ff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(960 - lineWidth, titleY + 45);
  ctx.lineTo(960 + lineWidth, titleY + 45);
  ctx.stroke();
  ctx.restore();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
